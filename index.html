<script>
const TMAP={GOLD:'GOLD.AX',MVA:'MVA.AX',VHY:'VHY.AX',RFF:'RFF.AX',SEMI:'SEMI.AX',ASIA:'ASIA.AX',GEAR:'GEAR.AX',MI6:'MI6.AX',VMM:'VMM.AX',PLS:'PLS.AX',NDQ:'NDQ.AX',IOO:'IOO',IVV:'IVV'};
function yt(t){return TMAP[t]||t;}
let LD={},fetchIP=false,lastF=null,fetchErr={};

// Fetch via Yahoo Finance quoteSummary page — extract JSON from the page source
async function fetchViaPage(ticker){
  const yfT=yt(ticker);
  const url=`https://finance.yahoo.com/quote/${yfT}/`;
  const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  try{
    const r=await fetch(proxy,{signal:AbortSignal.timeout(12000)});
    if(!r.ok)return null;
    const j=await r.json();
    const html=j.contents||'';
    if(html.length<1000)return null;

    // Yahoo embeds data in multiple possible formats. Try all.
    let price=null,ret1yr=null,dy=null;

    // Pattern 1: "regularMarketPrice":{"raw":123.45} (older format, still sometimes present)
    let m=html.match(/"regularMarketPrice":\{[^}]*"raw":([\d.]+)/);
    if(m)price=parseFloat(m[1]);

    // Pattern 2: "regularMarketPrice":123.45 (flat JSON)
    if(!price){m=html.match(/"regularMarketPrice":([\d.]+)/);if(m)price=parseFloat(m[1]);}

    // Pattern 3: data-field="regularMarketPrice" ... value="123.45"
    if(!price){m=html.match(/data-field="regularMarketPrice"[^>]*value="([\d.]+)"/);if(m)price=parseFloat(m[1]);}

    // Pattern 4: fin-streamer with data-value
    if(!price){m=html.match(/data-field="regularMarketPrice"[^>]*data-value="([\d.]+)"/);if(m)price=parseFloat(m[1]);}

    // 52-week change
    m=html.match(/"fiftyTwoWeekChangePercent":\{[^}]*"raw":([-\d.]+)/);
    if(m)ret1yr=parseFloat(m[1])*100;
    if(ret1yr==null){m=html.match(/"fiftyTwoWeekChangePercent":([-\d.]+)/);if(m)ret1yr=parseFloat(m[1])*100;}

    // Dividend yield
    m=html.match(/"dividendYield":\{[^}]*"raw":([\d.]+)/)||html.match(/"trailingAnnualDividendYield":\{[^}]*"raw":([\d.]+)/);
    if(m)dy=parseFloat(m[1])*100;
    if(dy==null){m=html.match(/"dividendYield":([\d.]+)/);if(m)dy=parseFloat(m[1])*100;}

    // Try extracting from the big JSON blob (root.App.main or similar)
    if(!price){
      m=html.match(/"quoteSummary":\{.*?"price":\{.*?"regularMarketPrice":\{[^}]*"raw":([\d.]+)/s);
      if(m)price=parseFloat(m[1]);
    }

    if(price&&price>0)return{t:ticker,price,ret1yr,yield:dy,ok:true,src:'page'};
  }catch(e){}
  return null;
}

// Fetch via Yahoo v8 chart API (works when crumb not enforced)
async function fetchViaChart(ticker){
  const yfT=yt(ticker);
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${yfT}?interval=1d&range=1y`;
  const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  try{
    const r=await fetch(proxy,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return null;
    const j=await r.json();
    if(!j.contents)return null;
    const d=JSON.parse(j.contents);
    const res=d?.chart?.result?.[0];if(!res)return null;
    const meta=res.meta;
    const cl=(res.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null&&v>0);
    if(cl.length<2)return null;
    const last=meta.regularMarketPrice||cl[cl.length-1];
    const ret=((last-cl[0])/cl[0])*100;
    return{t:ticker,price:last,ret1yr:ret,yield:meta.dividendYield?meta.dividendYield*100:null,ok:true,src:'chart'};
  }catch(e){}
  return null;
}

// Fetch via Yahoo v6 quote endpoint (batch capable, basic data)
async function fetchViaBatchQuote(tickers){
  const yfTickers=tickers.map(t=>yt(t)).join(',');
  const url=`https://query1.finance.yahoo.com/v6/finance/quote?symbols=${yfTickers}`;
  const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  try{
    const r=await fetch(proxy,{signal:AbortSignal.timeout(12000)});
    if(!r.ok)return{};
    const j=await r.json();
    if(!j.contents)return{};
    const d=JSON.parse(j.contents);
    const results=d?.quoteResponse?.result||[];
    const out={};
    results.forEach(q=>{
      const orig=tickers.find(t=>yt(t)===q.symbol)||q.symbol;
      out[orig]={
        t:orig,
        price:q.regularMarketPrice,
        ret1yr:q.fiftyTwoWeekChangePercent!=null?q.fiftyTwoWeekChangePercent*100:null,
        yield:q.dividendYield||q.trailingAnnualDividendYield?((q.dividendYield||q.trailingAnnualDividendYield)*100):null,
        ok:true,src:'v6batch'
      };
    });
    return out;
  }catch(e){return{};}
}

// Master fetch per ticker
async function fetchQ(t){
  // Try chart API first (gives 1yr data), then page scraping
  let result=await fetchViaChart(t);
  if(result){delete fetchErr[t];return result;}
  result=await fetchViaPage(t);
  if(result){delete fetchErr[t];return result;}
  fetchErr[t]=true;
  return{t,ok:false};
}

async function fetchAll(force=false){
  if(fetchIP)return;
  if(!force&&lastF&&(Date.now()-lastF)<5*60*1000)return;
  fetchIP=true;setLS('sp','Fetching live prices...');
  const all=[...new Set([...PB.etfs.map(e=>e.t),...PA.etfs.map(e=>e.t),...Object.keys(customTickers)])];

  // Strategy A: Try batch v6 quote for all tickers at once (fastest)
  setLS('sp','Trying batch quote...');
  const batchResult=await fetchViaBatchQuote(all);
  const batchOk=Object.keys(batchResult).length;
  if(batchOk>0){
    Object.entries(batchResult).forEach(([t,r])=>{LD[t]=r;delete fetchErr[t];});
  }

  // Strategy B: For any tickers not loaded via batch, try individual fetch
  const remaining=all.filter(t=>!LD[t]?.ok);
  if(remaining.length>0&&remaining.length<all.length){
    setLS('sp',`Batch loaded ${batchOk}. Fetching ${remaining.length} remaining...`);
  }else if(remaining.length===all.length){
    setLS('sp','Batch failed. Trying individual fetches...');
  }

  let done=0;
  const BATCH=2;
  for(let i=0;i<remaining.length;i+=BATCH){
    const batch=remaining.slice(i,i+BATCH);
    const res=await Promise.all(batch.map(t=>fetchQ(t)));
    res.forEach(r=>{if(r.ok)LD[r.t]=r;});
    done+=batch.length;
    if(remaining.length>0)setLS('sp',`Fetching... ${batchOk+done}/${all.length}`);
    if(i+BATCH<remaining.length)await new Promise(r=>setTimeout(r,600));
  }

  const ok=all.filter(t=>LD[t]?.ok).length;
  const fail=all.length-ok;
  lastF=Date.now();fetchIP=false;
  if(ok>0){
    setLS('ok',`${ok}/${all.length} prices loaded`);
    document.getElementById('ldet').textContent=fail>0?`· ${fail} unavailable`:'';
  }else{
    setLS('er','Live data unavailable — all methods failed. Try refreshing later.');
    document.getElementById('ldet').textContent='Proxies may be rate limited. Cached data shown if available.';
  }
  document.getElementById('lts').textContent='Updated '+new Date().toLocaleTimeString();
  try{localStorage.setItem('ph_ld',JSON.stringify({d:LD,ts:lastF}));}catch(e){}
  const at=document.querySelector('.mt.active')?.id?.replace('mt-','');
  if(at==='dash')rdash();if(at==='track')rtrack();if(at==='news')rnews();
}
function setLS(s,m){const d=document.getElementById('ldot'),t=document.getElementById('lstxt');d.className='ld'+(s==='sp'?' sp':s==='er'?' er':'');t.textContent=m;}
function gl(t){return LD[t]||null;}
function fret(t){const d=gl(t);if(!d)return{tx:'…',cl:'rl',v:null};if(!d.ok||d.ret1yr==null)return{tx:'n/a',cl:'rl',v:null};const v=d.ret1yr;return{tx:(v>=0?'+':'')+v.toFixed(1)+'%',cl:v>=0?'rp':'rn',v};}
function fpx(t){const d=gl(t);if(!d||!d.ok||!d.price)return'—';return d.price.toFixed(2);}

const PB={
  title:'Portfolio B',sub:'Income + growth — updated Apr 2026 (increased international)',
  meta:{focus:'Income + Growth',risk:'Moderate',broker:'Interactive Brokers',cur:'USD',sym:'$'},
  badges:[{l:'Income engine',bg:'#e1f5ee',c:'#0f6e56'},{l:'Factor tilt',bg:'#eeedfe',c:'#3c3489'},{l:'Increased international',bg:'#e6f1fb',c:'#0c447c'},{l:'~55% US exposure',bg:'#faeeda',c:'#633806'}],
  yield:3.6,cov:'50+',er:0.22,hint:'VOO trimmed 20→13% · VXUS+IEMG+INDA+VWO boosted',
  warn:'KWEB carries geopolitical risk — can lose 30–50% rapidly. Keep at 2% max. Use limit orders for EM ETFs on IB. VOO was trimmed from 20% to 13% to reduce US concentration.',
  sl:[
    {l:'Core US',p:13,e:'VOO',bg:'#e6f1fb',td:'#0c447c',tl:'#185fa5'},

function save(){

  }catch(e){}
}

  try{const h=localStorage.getItem('ph_h4');if(h)holdings=JSON.parse(h);}catch(e){}
  try{const p=localStorage.getItem('ph_p4');if(p)purch=JSON.parse(p);}catch(e){}
  try{const c=localStorage.getItem('ph_ct2');if(c)customTickers=JSON.parse(c);}catch(e){}
  try{const m=localStorage.getItem('ph_mp2');if(m)myPos=JSON.parse(m);}catch(e){}
  try{

      if(lastF&&(Date.now()-lastF)<30*60*1000){
        setLS('ok','Prices from cache ('+new Date(lastF).toLocaleTimeString()+')');
        document.getElementById('lts').textContent='Cached '+new Date(lastF).toLocaleTimeString();
      }}
  }catch(e){}
  document.getElementById('saved').textContent='Data loaded';
}

function go(t){
  ['dash','myport','track','dca','log','news'].forEach(id=>{
    document.getElementById('t-'+id).style.display=id===t?'':'none';
    document.getElementById('mt-'+id).className='mt'+(id===t?' active':'');
  });
  if(t==='dash')rdash();if(t==='myport')rmyport();if(t==='track')rtrack();if(t==='dca')rdca();if(t==='log')rlog();if(t==='news')rnews();
}
function sp(p){CP=p;rdash();}function stp(p){CP=p;rtrack();}function sdp(p){CDP=p;rdca();}function slp(p){CLP=p;rlog();}

function ptabs(fn,cur){return`<div class="ptabs"><div class="pt${cur==='B'?' active':''}" onclick="${fn}('B')">Portfolio B — IB (USD)</div><div class="pt${cur==='A'?' active':''}" onclick="${fn}('A')">Portfolio A — CMC (AUD)</div></div>`;}

function allEtfs(k){
  const p=PORT(k);
  const base=p.etfs.map(e=>({...e,custom:false}));
  const cust=Object.entries(customTickers).filter(([t,v])=>v.port===k||v.port==='both').map(([t,v])=>({t,n:v.name||t,f:'Custom',p:0,er:0,sy:0,rat:v.note||'Custom position.',tags:['Custom'],keys:'—',custom:true}));
  return[...base,...cust];
}
function loggedTickers(){return[...new Set([...(purch.B||[]).map(x=>x.ticker),...(purch.A||[]).map(x=>x.ticker)])];}

function bret(){const p=PORT(CP);let ws=0,tw=0;p.etfs.forEach(e=>{const d=gl(e.t);if(d&&d.ok&&d.ret1yr!=null){ws+=e.p*d.ret1yr;tw+=e.p;}});return tw>0?ws/tw:null;}

function bdSection(items,title){
  const max=Math.max(...items.map(x=>x.p));
  let h=`<div class="cc"><div class="ct">${title}</div><div class="blist">`;
  items.forEach(x=>{
    h+=`<div class="bitem">
      <div class="blabel"><span class="bname">${x.n}</span><span class="bval">${x.p.toFixed(1)}%</span></div>
      <div class="btrack"><div class="bfill" style="width:${Math.round(x.p/max*100)}%;background:${x.col}"></div></div>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

function ddn(pk,p){
  const id='dn-'+pk;if(charts[id])charts[id].destroy();
  const ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{type:'doughnut',data:{labels:p.sl.map(s=>s.l),datasets:[{data:p.sl.map(s=>s.p),backgroundColor:p.sl.map(s=>s.tl),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.label+': '+c.parsed+'%'}}}}});
}
function dbr(pk,p){
  const id='br-'+pk;if(charts[id])charts[id].destroy();
  const ctx=document.getElementById(id);if(!ctx)return;
  const slColors=p.etfs.map(e=>{const s=p.sl.find(s=>s.l===e.f||e.f.startsWith(s.l.split(' ')[0]))||p.sl[0];return s.tl;});
  const rets=p.etfs.map(e=>{const d=gl(e.t);return d?.ok&&d.ret1yr!=null?parseFloat(d.ret1yr.toFixed(1)):null;});
  charts[id]=new Chart(ctx,{type:'bar',data:{labels:p.etfs.map(e=>e.t),datasets:[
    {label:'Weight %',data:p.etfs.map(e=>e.p),backgroundColor:slColors,yAxisID:'y',borderRadius:3},
    {label:'1-yr return %',data:rets,type:'line',yAxisID:'y2',borderColor:'#378add',backgroundColor:'#378add',pointRadius:3,tension:0.3,fill:false,spanGaps:true}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:false,maxRotation:45},grid:{display:false}},y:{position:'left',ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.05)'}},y2:{position:'right',ticks:{font:{size:10},callback:v=>v+'%'},grid:{display:false}}}}});
}

function rtrack(){
  const p=PORT(CP);const sym=p.meta.sym;const held=holdings[CP]||{};
  const all=allEtfs(CP);const tot=Object.values(held).reduce((s,v)=>s+v,0);
  let on=0,dr=0,un=0;
  all.forEach(e=>{const h=held[e.t]||0;if(!h){un++;return;}const a=tot?(h/tot)*100:0;Math.abs(a-e.p)<=3?on++:dr++;});
  const needs=all.filter(e=>{const h=held[e.t]||0;if(!h||e.p===0)return false;const a=tot?(h/tot)*100:0;return Math.abs(a-e.p)>3;});
  const maxP=Math.max(...all.map(e=>e.p),1);
  const sls=[...new Set(all.map(e=>e.f))];
  let h=ptabs('stp',CP);
  h+=`<div class="ci-box">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px">Add a custom position</div>
    <div class="ci-row">
      <div><label style="font-size:11px;color:#666;display:block;margin-bottom:3px">Ticker</label><input type="text" id="ct-t" placeholder="e.g. AAPL" style="width:100px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
      <div><label style="font-size:11px;color:#666;display:block;margin-bottom:3px">Name</label><input type="text" id="ct-n" placeholder="Apple Inc." style="width:160px"></div>
      <div><label style="font-size:11px;color:#666;display:block;margin-bottom:3px">Portfolio</label><select id="ct-p" style="padding:7px 9px"><option value="B">Portfolio B</option><option value="A">Portfolio A</option><option value="both">Both</option></select></div>

    </div>
    ${Object.keys(customTickers).length>0?`<div style="margin-top:10px;display:flex;flex-wrap:wrap">${Object.entries(customTickers).map(([t,v])=>`<span class="cpill">${t}<span class="cstb">${v.port}</span><button onclick="removeCT('${t}')">×</button></span>`).join('')}</div>`:''}
  </div>`;
  h+=`<div class="g">
    <div class="mc"><div class="mc-l">Total held</div><div class="mc-v">${sym}${Math.round(tot).toLocaleString()}</div></div>

    <div class="mc"><div class="mc-l">Needs rebal</div><div class="mc-v" style="color:${dr>0?'#a87020':'#2d6b0e'}">${dr}</div><div class="mc-s">drifted &gt;3%</div></div>
    <div class="mc"><div class="mc-l">Not started</div><div class="mc-v" style="color:#534ab7">${un}</div></div>
  </div>
  <p style="font-size:11px;color:#888;margin-bottom:10px">Enter current value of each holding. <span style="background:#eaf3de;color:#2d6b0e;padding:1px 6px;border-radius:3px;font-size:10px">green</span> = on target ±3% &nbsp;<span style="background:#fef3e2;color:#7a4a0a;padding:1px 6px;border-radius:3px;font-size:10px">orange</span> = drifted &gt;3% &nbsp;<span style="background:#fde8e8;color:#a32d2d;padding:1px 6px;border-radius:3px;font-size:10px">red</span> = drifted &gt;7%</p>`;
  sls.forEach(sl=>{
    const rows=all.filter(e=>e.f===sl);
    const slh=rows.reduce((t,e)=>t+(held[e.t]||0),0);
    h+=`<div class="sec">${sl} — ${sym}${Math.round(slh).toLocaleString()} held</div>`;
    rows.forEach(e=>{
      const hv=held[e.t]||0;const a=tot?(hv/tot)*100:0;
      const drift=hv?a-e.p:null;const ad=drift!=null?Math.abs(drift):null;
      let dc='dna',dl=hv?'0%':'not started';
      if(drift!=null){if(ad<=3){dc='dok';dl=(drift>=0?'+':'')+drift.toFixed(1)+'%';}else if(ad<=7){dc='dwn';dl=(drift>=0?'+':'')+drift.toFixed(1)+'%';}else{dc='dal';dl=(drift>=0?'+':'')+drift.toFixed(1)+'%';}}
      const ret=fret(e.t);const px=fpx(e.t);
      const cb=e.custom?'<span class="cstb">custom</span>':'';
      const changed=e.tags&&e.tags.some(t=>t.includes('→'))?'<span class="newb">updated</span>':'';
      h+=`<div class="ei"><div class="ctb">

        <span style="font-size:11px;color:#888;min-width:60px;text-align:right">${sym}${Math.round(hv).toLocaleString()}</span>
      </div></div>`;
    });
  });
  if(needs.length){
    h+=`<div class="abox"><div class="sec" style="margin-top:0;margin-bottom:7px">Action needed</div>`;
    needs.forEach(e=>{const hv=held[e.t]||0;const a=tot?(hv/tot)*100:0;const d2=a-e.p;const ov=d2>0;h+=`<div class="arow"><span style="font-weight:500">${e.t}</span><span style="color:#666;font-size:11px">${ov?'Overweight — buy other positions instead':'Underweight — prioritise buying this next'}</span><span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;background:${ov?'#fef3e2':'#fde8e8'};color:${ov?'#7a4a0a':'#a32d2d'}">${(d2>=0?'+':'')+d2.toFixed(1)}%</span></div>`;});
    h+=`</div>`;
  }
  document.getElementById('t-track').innerHTML=h;
  document.getElementById('ct-p').value=CP;

function uh(t,v){if(!holdings[CP])holdings[CP]={};holdings[CP][t]=parseFloat(v)||0;save();rtrack();}
function addCT(){
  const t=(document.getElementById('ct-t')?.value||'').trim().toUpperCase();if(!t)return;
  customTickers[t]={name:document.getElementById('ct-n')?.value||t,port:document.getElementById('ct-p')?.value||'B',note:document.getElementById('ct-no')?.value||''};
  save();fetchQ(t).then(r=>{if(r.ok)LD[r.t]=r;rtrack();});rtrack();
}
function removeCT(t){delete customTickers[t];save();rtrack();}

function rdca(){
  const p=PORT(CDP);const sym=p.meta.sym;
  let h=ptabs('sdp',CDP);
  h+=`<div class="card"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
    <span style="font-size:12px;color:#666">Monthly investment (${p.meta.cur}):</span>

    <span style="font-size:12px;color:#666;margin-left:8px">Strategy:</span>
    <select style="padding:6px 10px;font-size:12px;border:1px solid #d5d5d0;border-radius:8px;outline:none;background:#fff;width:190px" id="ds-${CDP}" onchange="rdca()">

  const strat=document.getElementById('ds-'+CDP)?.value||'target';
  let elig=CDP==='A'?p.etfs.filter(e=>!e.spec):p.etfs;
  if(strat==='income')elig=elig.filter(e=>e.sy>0);
  const tp=elig.reduce((s,e)=>s+e.p,0);
  const rows=elig.map(e=>({...e,buy:strat==='equal'?amt/elig.length:(e.p/tp)*amt}));
  const mn=rows.length?rows.reduce((a,b)=>a.buy<b.buy?a:b):null;
  const mx=rows.length?rows.reduce((a,b)=>a.buy>b.buy?a:b):null;
  h+=`<div class="g" style="margin-bottom:14px">
    <div class="mc"><div class="mc-l">Monthly total</div><div class="mc-v">${sym}${Math.round(amt).toLocaleString()}</div></div>

    <div class="mc"><div class="mc-l">Smallest</div><div class="mc-v">${sym}${Math.round(mn?.buy||0)}</div><div class="mc-s">${mn?.t||''}</div></div>
    <div class="mc"><div class="mc-l">Largest</div><div class="mc-v">${sym}${Math.round(mx?.buy||0)}</div><div class="mc-s">${mx?.t||''}</div></div>
  </div>`;
  const sls=[...new Set(rows.map(r=>r.f))];const mxP=Math.max(...rows.map(r=>r.p),1);
  sls.forEach(sl=>{
    const sr=rows.filter(r=>r.f===sl);const st2=sr.reduce((a,r)=>a+r.buy,0);
    const sd=p.sl.find(x=>x.l===sl||sl.startsWith(x.l.split(' ')[0]))||p.sl[0];
    h+=`<div class="sec">${sl} — ${sym}${Math.round(st2).toLocaleString()}</div>`;
    sr.forEach(r=>{const ret=fret(r.t);h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:8px 10px;background:#f8f8f6;border:1px solid #e5e5e0;border-radius:8px">
      <span style="font-weight:500;font-size:12px;min-width:50px">${r.t}</span>
      <span style="font-size:11px;color:#888;min-width:32px">${r.p}%</span>
      <div style="flex:1;height:5px;background:#e8e8e4;border-radius:2px;overflow:hidden"><div style="width:${Math.min(100,r.p/mxP*100)}%;height:100%;background:${sd.tl};border-radius:2px"></div></div>
      <span style="font-size:13px;font-weight:500;min-width:70px;text-align:right">${sym}${Math.round(r.buy).toLocaleString()}</span>
      <span class="${ret.cl}" style="min-width:55px;text-align:right;font-size:11px">${ret.tx}</span>

  });
  if(CDP==='A')h+=`<div style="margin-top:8px;padding:8px 12px;background:#fef3e2;border-radius:8px;font-size:11px;color:#7a4a0a;border:1px solid #f5d9a0">Mining specs excluded — hold-only positions.</div>`;
  h+=`<div style="margin-top:12px;padding:11px 13px;background:#f8f8f6;border-radius:8px;font-size:11px;color:#555;line-height:1.7"><b>How to use:</b> Check Holdings Tracker first — buy red/orange positions (most underweight) first. Rebalance once a year by buying laggards, not selling (avoids CGT).</div></div>`;
  document.getElementById('t-dca').innerHTML=h;
}

function ap(){
  const port=CLP;const t=document.getElementById('lt-'+port)?.value;const a=parseFloat(document.getElementById('la-'+port)?.value);
  const px=document.getElementById('lp-'+port)?.value;const d=document.getElementById('ld-'+port)?.value||new Date().toISOString().slice(0,10);
  if(!t||!a||a<=0)return;
  purch[port].unshift({ticker:t,amount:a,price:px||null,date:d,id:Date.now()});
  if(!holdings[port])holdings[port]={};holdings[port][t]=(holdings[port][t]||0)+a;
  save();rlog();
}
function dp(id){
  const port=CLP;const i=purch[port].findIndex(p=>p.id===id);if(i===-1)return;
  const x=purch[port][i];holdings[port][x.ticker]=Math.max(0,(holdings[port][x.ticker]||0)-x.amount);
  purch[port].splice(i,1);save();rlog();
}

async function fetchNews(ticker){
  if(newsCache[ticker]&&(Date.now()-newsCache[ticker].ts)<10*60*1000)return newsCache[ticker].items;
  const newsUrl=`https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(yt(ticker))}&newsCount=8&quotesCount=0`;
  const proxyUrl=`https://api.allorigins.win/get?url=${encodeURIComponent(newsUrl)}`;
  try{
    const r=await fetch(proxyUrl,{signal:AbortSignal.timeout(8000)});if(!r.ok)return[];
    const j=await r.json();
    const raw=JSON.parse(j.contents);
    const items=(raw?.news||[]).slice(0,6).map(n=>({title:n.title,link:n.link,source:n.publisher||'',time:n.providerPublishTime?new Date(n.providerPublishTime*1000).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'',ticker}));
    newsCache[ticker]={items,ts:Date.now()};return items;
  }catch(e){return[];}
}

async function rnews(){
  const el=document.getElementById('t-news');
  const tickers=[...new Set([...heldTickers(),...loggedTickers()])];
  const filters=['ALL',...tickers];
  let h=`<div style="font-size:16px;font-weight:500;margin-bottom:4px">News feed</div>
  <div style="font-size:12px;color:#666;margin-bottom:14px">Latest news for your positions — Yahoo Finance · refreshes every 10 minutes</div>`;
  if(!tickers.length){h+=`<div class="card"><div class="empty">No positions found. Log purchases in Purchase Log or enter holdings in Holdings Tracker.</div></div>`;el.innerHTML=h;return;}
  h+=`<div class="nflt" id="nflt-row">${filters.map(f=>`<div class="nf${NF===f?' active':''}" onclick="setNF('${f}')">${f}</div>`).join('')}<button class="rbtn" onclick="newsCache={};rnews()" style="margin-left:4px">↻ Refresh</button></div>
  <div id="news-body"><div class="nload">Loading news...</div></div>`;
  el.innerHTML=h;
  await loadNews(NF,tickers);
}
async function loadNews(filter,tickers){
  const toFetch=filter==='ALL'?tickers:[filter];
  const allNews=[];
  await Promise.all(toFetch.map(async t=>{const items=await fetchNews(t);allNews.push(...items);}));
  const nb=document.getElementById('news-body');if(!nb)return;
  if(!allNews.length){nb.innerHTML=`<div class="card"><div class="empty">No news found for ${filter==='ALL'?'your positions':filter}.</div></div>`;return;}
  let html=`<div class="ng">`;
  allNews.forEach(item=>{html+=`<div class="nc"><div><span class="nt">${item.ticker}</span><span style="font-size:11px;font-weight:500;color:#555">${item.source}</span></div><div class="ntitle"><a href="${item.link||'#'}" target="_blank" rel="noopener">${item.title||'Untitled'}</a></div><div class="nmeta">${item.time}</div></div>`;});
  html+=`</div>`;nb.innerHTML=html;
}
function setNF(f){
  NF=f;document.querySelectorAll('.nf').forEach(el=>{el.className='nf'+(el.textContent.trim()===f?' active':'');});
  const nb=document.getElementById('news-body');if(nb)nb.innerHTML=`<div class="nload">Loading...</div>`;
  const tickers=[...new Set([...heldTickers(),...loggedTickers()])];
  loadNews(f,tickers);
}

// ── MY PORTFOLIO ──────────────────────────────────────────────────────────
function smp(p){MPP=p;rmyport();}

function rmyport(){
  const port=MPP;
  const p=PORT(port);
  const sym=p.meta.sym;
  const positions=myPos[port]||[];
  const allE=allEtfs(port);

  // Calculate values
  let totalCost=0,totalValue=0;
  const rows=positions.map(pos=>{
    const cost=pos.units*pos.avgPrice;
    const live=gl(pos.ticker);
    const livePrice=live?.ok?live.price:null;
    const manualPrice=pos.manualPrice||null;
    const curPrice=manualPrice||livePrice||null;
    const priceSource=manualPrice?'manual':livePrice?'live':'none';
    const curValue=curPrice?pos.units*curPrice:cost;
    const gain=curPrice?(curValue-cost):0;
    const gainPct=cost>0&&curPrice?((curValue-cost)/cost)*100:null;
    totalCost+=cost;
    totalValue+=curPrice?curValue:cost;
    return{...pos,cost,curPrice,livePrice,manualPrice,priceSource,curValue,gain,gainPct};
  });

  const totalGain=totalValue-totalCost;
  const totalGainPct=totalCost>0?((totalValue-totalCost)/totalCost)*100:0;
  const posCount=rows.length;
  const winners=rows.filter(r=>r.gain>0).length;
  const losers=rows.filter(r=>r.gain<0).length;

  let h=`<div class="ptabs">
    <div class="pt${MPP==='B'?' active':''}" onclick="smp('B')">Portfolio B — IB (USD)</div>
    <div class="pt${MPP==='A'?' active':''}" onclick="smp('A')">Portfolio A — CMC (AUD)</div>
  </div>`;

  // Add position form
  h+=`<div class="card">
    <div style="font-size:14px;font-weight:500;margin-bottom:4px">Add a position</div>
    <div style="font-size:11px;color:#888;margin-bottom:12px">Enter each holding — ticker, units held, and your average price paid per unit</div>
    <div style="display:grid;grid-template-columns:1.2fr 0.8fr 0.8fr 1fr auto;gap:8px;align-items:end">
      <div class="fld"><label>Ticker</label>
        <select id="mp-ticker-${port}" onchange="document.getElementById('mp-custom-wrap-${port}').style.display=this.value==='__custom__'?'':'none'">
          ${allE.map(e=>`<option value="${e.t}">${e.t} — ${e.n}</option>`).join('')}
          <option value="__custom__">+ Custom ticker</option>
        </select>
      </div>
      <div class="fld"><label>Units held</label><input type="number" id="mp-units-${port}" min="0.01" step="0.01" placeholder="e.g. 50"></div>
      <div class="fld"><label>Avg price paid</label><input type="number" id="mp-price-${port}" min="0.01" step="0.01" placeholder="per unit"></div>
      <div class="fld" id="mp-custom-wrap-${port}" style="display:none"><label>Custom ticker</label><input type="text" id="mp-custom-${port}" placeholder="e.g. TSLA" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
      <button class="badd" onclick="addPos()">Add</button>
    </div>
  </div>`;

  // No inline script needed — onchange handles visibility

  if(!rows.length){
    h+=`<div class="card"><div class="empty">No positions added yet. Add your holdings above to see your real portfolio dashboard.</div></div>`;
    document.getElementById('t-myport').innerHTML=h;return;
  }

  // Summary cards
  h+=`<div class="g">
    <div class="mc"><div class="mc-l">Total value</div><div class="mc-v">${sym}${Math.round(totalValue).toLocaleString()}</div><div class="mc-s">${posCount} positions</div></div>
    <div class="mc"><div class="mc-l">Total cost</div><div class="mc-v">${sym}${Math.round(totalCost).toLocaleString()}</div><div class="mc-s">invested</div></div>
    <div class="mc"><div class="mc-l">Total gain/loss</div><div class="mc-v" style="color:${totalGain>=0?'#2d6b0e':'#a32d2d'}">${totalGain>=0?'+':''}${sym}${Math.round(Math.abs(totalGain)).toLocaleString()}</div><div class="mc-s">${totalGain>=0?'+':''}${totalGainPct.toFixed(1)}%</div></div>
    <div class="mc"><div class="mc-l">Winners / losers</div><div class="mc-v"><span style="color:#2d6b0e">${winners}</span> / <span style="color:#a32d2d">${losers}</span></div><div class="mc-s">of ${posCount} positions</div></div>
  </div>`;

  // Allocation donut + bar
  h+=`<div class="cr">
    <div class="cc"><div class="ct">Your actual allocation</div>
      <div style="position:relative;width:100%;height:160px"><canvas id="mp-donut-${port}"></canvas></div>
      <div style="margin-top:8px">`;
  rows.forEach(r=>{
    const pct=totalValue>0?(r.curValue/totalValue*100):0;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:11px">
      <span style="color:#666">${r.ticker}</span>
      <span style="font-weight:500">${pct.toFixed(1)}%</span>
    </div>`;
  });
  h+=`</div></div>
    <div class="cc"><div class="ct">Gain / loss by position</div>
      <div style="position:relative;width:100%;height:${Math.max(180,rows.length*28)}px"><canvas id="mp-gainbar-${port}"></canvas></div>
    </div>
  </div>`;

  // Actual vs target allocation
  const targetEtfs=p.etfs;
  h+=`<div class="cc" style="margin-bottom:16px"><div class="ct">Actual vs target allocation</div>`;
  const maxTgt=Math.max(...targetEtfs.map(e=>e.p),1);
  targetEtfs.forEach(e=>{
    const pos=rows.find(r=>r.ticker===e.t);
    const actualPct=pos&&totalValue>0?(pos.curValue/totalValue*100):0;
    const tgtW=Math.min(100,e.p/maxTgt*100);
    const actW=Math.min(100,actualPct/maxTgt*100);
    const drift=actualPct-e.p;
    const driftCls=Math.abs(drift)<=3?'dok':Math.abs(drift)<=7?'dwn':'dal';
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-weight:500;font-size:11px;min-width:48px">${e.t}</span>
      <div class="tbrs">
        <div style="display:flex;align-items:center;gap:4px"><span class="tbl" style="color:#2d6b0e">tgt ${e.p}%</span><div class="tbg"><div class="tbf" style="width:${tgtW}%;background:#2d6b0e;opacity:.45"></div></div></div>
        <div style="display:flex;align-items:center;gap:4px"><span class="tbl" style="color:#378add">act ${actualPct.toFixed(1)}%</span><div class="tbg"><div class="tbf" style="width:${actW}%;background:#378add"></div></div></div>
      </div>
      <span class="dr ${pos?driftCls:'dna'}" style="min-width:52px">${pos?(drift>=0?'+':'')+drift.toFixed(1)+'%':'—'}</span>
    </div>`;
  });
  // Custom positions not in target
  rows.filter(r=>!targetEtfs.find(e=>e.t===r.ticker)).forEach(r=>{
    const pct=totalValue>0?(r.curValue/totalValue*100):0;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-weight:500;font-size:11px;min-width:48px">${r.ticker}<span class="cstb">custom</span></span>
      <div class="tbrs">
        <div style="display:flex;align-items:center;gap:4px"><span class="tbl" style="color:#888">no target</span><div class="tbg"></div></div>
        <div style="display:flex;align-items:center;gap:4px"><span class="tbl" style="color:#378add">act ${pct.toFixed(1)}%</span><div class="tbg"><div class="tbf" style="width:${Math.min(100,pct/maxTgt*100)}%;background:#534ab7"></div></div></div>
      </div>
      <span class="dr dna">${pct.toFixed(1)}%</span>
    </div>`;
  });
  h+=`</div>`;

  // Sector + country breakdown (weighted by actual $ values)
  const sectorMap={},countryMap={};
  rows.forEach(r=>{
    const etfDef=p.etfs.find(e=>e.t===r.ticker);
    if(!etfDef)return;
    const weight=totalValue>0?r.curValue/totalValue:0;
    // Find sector/country data from portfolio definition
    const portSectors=p.sectors||[];
    const portCountries=p.countries||[];
    const tgtPct=etfDef.p;
    const totalTgt=p.etfs.reduce((s,e)=>s+e.p,0);
    const etfShare=tgtPct/totalTgt;
    // Approximate: scale portfolio sector data by this position's actual weight vs expected weight
    const scaleFactor=tgtPct>0?weight/etfShare:0;
    portSectors.forEach(s=>{sectorMap[s.n]=(sectorMap[s.n]||0)+s.p*scaleFactor/p.etfs.length*2;});
    portCountries.forEach(c=>{countryMap[c.n]=(countryMap[c.n]||0)+c.p*scaleFactor/p.etfs.length*2;});
  });

  // Holdings table
  h+=`<div class="sec">Your positions — ${posCount} holdings</div>
  <div style="font-size:11px;color:#888;margin-bottom:8px">💡 If a price is wrong or missing, type the current price in the "Cur. price" field — it overrides live data and saves.</div>`;
  const maxVal=Math.max(...rows.map(r=>r.curValue),1);
  rows.forEach((r,i)=>{
    const pct=totalValue>0?(r.curValue/totalValue*100):0;
    const etfDef=allE.find(e=>e.t===r.ticker);
    const srcBadge=r.priceSource==='manual'?'<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#eeedfe;color:#534ab7;font-weight:500;margin-left:3px">manual</span>':r.priceSource==='live'?'<span class="lb">live</span>':'<span class="stb">cost basis</span>';
    h+=`<div class="ei"><div style="display:grid;grid-template-columns:70px 1fr 65px 70px 70px 80px 90px 60px 30px;gap:5px;padding:10px 12px;align-items:center">
      <div>
        <div style="font-weight:500;font-size:13px">${r.ticker}${srcBadge}</div>
        <div style="font-size:10px;color:#888">${etfDef?.n||r.ticker}</div>
      </div>
      <div class="wb2"><div class="wbg"><div class="wf" style="width:${Math.round(r.curValue/maxVal*100)}%;background:${r.gain>=0?'#3b6d11':'#a32d2d'}"></div></div></div>
      <div style="text-align:right">
        <div style="font-size:11px;color:#888">${r.units} units</div>
        <div style="font-size:10px;color:#aaa">@${sym}${r.avgPrice.toFixed(2)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#888">Cur. price</div>
        <input type="number" style="width:65px;padding:3px 5px;font-size:11px;border:1px solid ${r.priceSource==='manual'?'#b0a8e0':'#d5d5d0'};border-radius:4px;outline:none;text-align:right;background:${r.priceSource==='manual'?'#f8f7fe':'#fff'}" value="${r.curPrice?r.curPrice.toFixed(2):''}" placeholder="${r.avgPrice.toFixed(2)}" min="0" step="0.01" onchange="setManualPrice(${i},this.value)">
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#888">Cost</div>
        <div style="font-size:12px;font-weight:500">${sym}${Math.round(r.cost).toLocaleString()}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#888">Value</div>
        <div style="font-size:12px;font-weight:500">${sym}${Math.round(r.curValue).toLocaleString()}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:${r.gain>=0?'#2d6b0e':'#a32d2d'}">${r.gain>=0?'+':'−'}${sym}${Math.round(Math.abs(r.gain)).toLocaleString()}</div>
        <div style="font-size:12px;font-weight:500;color:${r.gainPct!=null?(r.gainPct>=0?'#2d6b0e':'#a32d2d'):'#888'}">${r.gainPct!=null?(r.gainPct>=0?'+':'')+r.gainPct.toFixed(1)+'%':'—'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#888">Alloc</div>
        <div style="font-size:12px;font-weight:500">${pct.toFixed(1)}%</div>
      </div>
      <button class="db" onclick="removePos(${i})" title="Remove position">×</button>
    </div></div>`;
  });

  h+=`<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="badd" onclick="if(confirm('Clear all positions in this portfolio?')){myPos[MPP]=[];save();rmyport();}">Clear all</button>
  </div>`;

  h+=`<div style="font-size:11px;color:#888;margin-top:16px;line-height:1.6;padding-top:12px;border-top:1px solid #e5e5e0">
    Current value uses live prices when available, otherwise uses your cost basis. Gain/loss is unrealised — calculated as (current price × units) minus (avg price paid × units). Allocation shows each position as a % of total portfolio value. Data saved locally in your browser. Not financial advice.
  </div>`;

  document.getElementById('t-myport').innerHTML=h;

  // Draw charts
  requestAnimationFrame(()=>{
    // Donut
    const dId='mp-donut-'+port;
    if(charts[dId])charts[dId].destroy();
    const dCtx=document.getElementById(dId);
    if(dCtx&&rows.length){
      const colors=['#185fa5','#3b6d11','#854f0b','#0f6e56','#534ab7','#993c1d','#ba7517','#888780','#d85a30','#7f77dd','#1d9e75','#d4537e','#5f5e5a','#b4b2a9','#639922'];
      charts[dId]=new Chart(dCtx,{type:'doughnut',data:{
        labels:rows.map(r=>r.ticker),
        datasets:[{data:rows.map(r=>r.curValue),backgroundColor:rows.map((_,i)=>colors[i%colors.length]),borderWidth:2,borderColor:'#fff'}]
      },options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const v=c.parsed;const pct=totalValue>0?(v/totalValue*100).toFixed(1):'0';return' '+c.label+': '+sym+Math.round(v).toLocaleString()+' ('+pct+'%)';}}}}}});
    }
    // Gain bar
    const bId='mp-gainbar-'+port;
    if(charts[bId])charts[bId].destroy();
    const bCtx=document.getElementById(bId);
    if(bCtx&&rows.length){
      charts[bId]=new Chart(bCtx,{type:'bar',data:{
        labels:rows.map(r=>r.ticker),
        datasets:[{label:'Gain/Loss %',data:rows.map(r=>r.gainPct!=null?parseFloat(r.gainPct.toFixed(1)):0),backgroundColor:rows.map(r=>r.gain>=0?'#3b6d11':'#a32d2d'),borderRadius:3}]
      },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.x>=0?'+':''}${c.parsed.x.toFixed(1)}%`}}},scales:{x:{ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.05)'}},y:{ticks:{font:{size:11}},grid:{display:false}}}}});
    }
  });
}

function addPos(){
  const port=MPP;
  let ticker=document.getElementById('mp-ticker-'+port)?.value;
  if(ticker==='__custom__'){
    ticker=(document.getElementById('mp-custom-'+port)?.value||'').trim().toUpperCase();
    if(!ticker)return;
  }
  const units=parseFloat(document.getElementById('mp-units-'+port)?.value);
  const avgPrice=parseFloat(document.getElementById('mp-price-'+port)?.value);
  if(!ticker||!units||units<=0||!avgPrice||avgPrice<=0)return;

  // Check if position already exists — merge
  const existing=myPos[port].find(p=>p.ticker===ticker);
  if(existing){
    const totalCost=existing.units*existing.avgPrice+units*avgPrice;
    existing.units+=units;
    existing.avgPrice=totalCost/existing.units;
  }else{
    myPos[port].push({ticker,units,avgPrice,date:new Date().toISOString().slice(0,10)});
  }

  // Also update holdings tracker
  if(!holdings[port])holdings[port]={};
  const live=gl(ticker);
  const curVal=live?.ok?units*live.price:units*avgPrice;
  holdings[port][ticker]=(holdings[port][ticker]||0)+curVal;

  save();
  // Fetch price for this ticker if not already loaded
  if(!gl(ticker)?.ok){
    fetchQ(ticker).then(r=>{if(r.ok)LD[r.t]=r;rmyport();});
  }
  rmyport();
}

function removePos(i){
  const port=MPP;
  if(i<0||i>=myPos[port].length)return;
  myPos[port].splice(i,1);
  save();rmyport();
}

function setManualPrice(i,val){
  const port=MPP;
  if(i<0||i>=myPos[port].length)return;
  const v=parseFloat(val);
  if(v&&v>0){
    myPos[port][i].manualPrice=v;
  }else{
    delete myPos[port][i].manualPrice;
  }
  save();rmyport();
}

load();rdash();fetchAll();
</script>
